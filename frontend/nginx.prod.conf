server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large file uploads (images, etc.)
    client_max_body_size 50m;

    # Proxy /api/* to backend container
    location /api/ {
        proxy_pass http://travelio-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 50m;
    }

    # Proxy MinIO buckets (uploaded images)
    location /cards/ {
        proxy_pass http://travelio-minio:9000/cards/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /photos/ {
        proxy_pass http://travelio-minio:9000/photos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /expressions/ {
        proxy_pass http://travelio-minio:9000/expressions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /accommodation/ {
        proxy_pass http://travelio-minio:9000/accommodation/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
